<!DOCTYPE html>
<html lang="en">

<head>
  <title>Enterprise PBR Sample Renderer</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <link type="text/css" rel="stylesheet" href="main.css">
</head>

<body>
  <div id="info">
    <a href="https://github.com/DassaultSystemes-Technology/EnterprisePBRShadingModel">Enterprise PBR</a> Sample
    Renderer
    <div id="version">dev</div>
  </div>

  <div id="startpage" class="overlay">
    <div class="overlay-card start-card">
      <div class="overlay-kicker">dspbr-pt Viewer</div>
      <h1>Drop a Scene</h1>
      <p class="overlay-copy">Load a <code>.glb</code>, a <code>.gltf</code> with assets, or an <code>.hdr</code> environment.</p>
      <div class="overlay-chip-row">
        <span class="overlay-chip">.glb</span>
        <span class="overlay-chip">.gltf + assets</span>
        <span class="overlay-chip">.hdr</span>
      </div>
    </div>
  </div>

  <div id="loadscreen" class="overlay" style="visibility: hidden">
    <div class="overlay-card load-card">
      <div class="overlay-kicker">Preparing Renderer</div>
      <h2 id="status">Loading Scene...</h2>
      <p id="status-detail" class="overlay-copy">Parsing assets, uploading resources, and compiling shaders.</p>
      <div class="spinner" style="visibility: hidden;">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>
      <p id="status-meta" class="overlay-meta">Large assets and fresh shaders can take a moment.</p>
    </div>
  </div>


  <div id="bottom-info">
  <div id="ibl-info"></div>
  <div id="scene-info"></div>
  </div>


  <script src="index.ts" type="module"></script>

</body>

</html>
